<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia April 21, 2026 — Referendum Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0f1117;
  --surface:     #1a1d27;
  --surface2:    #20243a;
  --border:      #2a2d3a;
  --border2:     #353a50;
  --text:        #e8eaf0;
  --text-muted:  #8890a8;
  --accent:      #3a8fd4;
  --yes:         #2166ac;
  --yes-lt:      #74add1;
  --yes-bg:      rgba(33,102,172,.12);
  --no:          #c0392b;
  --no-lt:       #e57368;
  --no-bg:       rgba(192,57,43,.12);
  --green:       #27ae60;
  --amber:       #f0a500;
  --radius:      6px;
  --font:        'DM Sans', system-ui, sans-serif;
  --mono:        'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 52px;
  flex-shrink: 0;
}

#header .logo {
  height: 28px;
  background: #fff;
  border-radius: 4px;
  padding: 2px 6px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
#header .logo span {
  font-weight: 700;
  font-size: 11px;
  color: #1a3a6b;
  letter-spacing: .04em;
  text-transform: uppercase;
}

#header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
#header h1 span { color: var(--accent); }

#header .meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  flex-shrink: 0;
}
#header .meta .refresh-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-right: 4px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .3; }
}

/* ── STATEWIDE BANNER ──────────────────────────────────── */
#banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  flex-shrink: 0;
}

.banner-row {
  display: flex;
  align-items: center;
  gap: 24px;
}

.vote-block {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.vote-block .label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.vote-block.yes .label { color: var(--yes-lt); }
.vote-block.no  .label { color: var(--no-lt); }
.vote-block .count {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
}
.vote-block.yes .count { color: #a8c8e8; }
.vote-block.no  .count { color: #e8a8a0; }
.vote-block .pct {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  opacity: .75;
}

.vote-bar-wrap {
  flex: 1;
  min-width: 120px;
}
.vote-bar {
  height: 10px;
  border-radius: 5px;
  background: var(--border2);
  overflow: hidden;
  display: flex;
}
.vote-bar .bar-yes {
  background: var(--yes);
  height: 100%;
  transition: width .6s ease;
}
.vote-bar .bar-no {
  background: var(--no);
  height: 100%;
  transition: width .6s ease;
}

.banner-stats {
  display: flex;
  gap: 24px;
  margin-left: auto;
}
.stat-cell {
  text-align: right;
}
.stat-cell .s-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  display: block;
}
.stat-cell .s-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.stat-cell .s-val.highlight { color: var(--accent); }

.reporting-bar-wrap {
  margin-top: 8px;
}
.reporting-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--border2);
  overflow: hidden;
}
.reporting-bar .bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width .6s ease;
}
.reporting-label {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--mono);
  margin-top: 3px;
}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#body {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar .sb-head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar .sb-head button {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 10px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  margin-bottom: 8px;
  transition: background .15s, border-color .15s;
}
#sidebar .sb-head button:hover,
#sidebar .sb-head button.active {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--accent);
}
#sidebar input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  padding: 6px 10px;
  font-family: var(--font);
  font-size: 12px;
  outline: none;
}
#sidebar input:focus { border-color: var(--accent); }
#sidebar input::placeholder { color: var(--text-muted); }

#locality-list {
  flex: 1;
  overflow-y: auto;
  list-style: none;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
#locality-list li {
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 0;
  transition: background .1s;
}
#locality-list li:hover    { background: var(--surface2); }
#locality-list li.active   { background: rgba(58,143,212,.12); }
#locality-list li .loc-name {
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#locality-list li .loc-name.active-name { color: var(--accent); }
#locality-list li .loc-mini {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
#locality-list li .loc-bar {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
#locality-list li .loc-bar .lb-fill {
  height: 100%;
  background: var(--accent);
}
#locality-list li .loc-pct {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* ── MAIN PANEL ─────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

/* Back button */
#back-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-muted);
  padding: 5px 12px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: border-color .15s, color .15s;
}
#back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Locality header in drill-down */
#loc-header {
  display: none;
  margin-bottom: 14px;
}
#loc-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.loc-stat-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.loc-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  min-width: 90px;
}
.loc-stat .ls-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
}
.loc-stat .ls-val {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
}
.loc-stat .ls-val.yes-color { color: var(--yes-lt); }
.loc-stat .ls-val.no-color  { color: var(--no-lt); }

/* Table */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.tbl-title {
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tbl-title .tbl-count {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 11px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
thead th {
  padding: 8px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  text-align: left;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
thead th.right { text-align: right; }

tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.03); }
tbody tr.dim { opacity: .45; }

td {
  padding: 8px 12px;
  white-space: nowrap;
}
td.name-cell {
  font-weight: 500;
  cursor: pointer;
  color: var(--accent);
}
td.name-cell:hover { text-decoration: underline; }
td.right { text-align: right; font-family: var(--mono); }

td .yes-val { color: var(--yes-lt); font-family: var(--mono); }
td .no-val  { color: var(--no-lt);  font-family: var(--mono); }
td .muted   { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }

.pct-bar {
  display: inline-block;
  height: 10px;
  border-radius: 3px;
  vertical-align: middle;
  margin-right: 5px;
}
.pct-bar.yes { background: var(--yes); }
.pct-bar.no  { background: var(--no); }

/* Status badge */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.badge.reported  { background: rgba(39,174,96,.18);  color: #5dba7f; }
.badge.not-rep   { background: var(--border2); color: var(--text-muted); }
.badge.partial   { background: rgba(240,165,0,.15);  color: #f0c050; }

/* Empty / loading states */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.state-msg h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.state-msg p  { font-size: 13px; }

/* Absentee context strip */
.ab-note {
  font-size: 11px;
  color: var(--text-muted);
}
.ab-note strong { color: var(--text); }

/* Method breakdown row */
.method-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.method-chip {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
}
.method-chip .mc-label { color: var(--text-muted); }
.method-chip .mc-yes   { color: var(--yes-lt); font-family: var(--mono); }
.method-chip .mc-no    { color: var(--no-lt);  font-family: var(--mono); }
.method-chip .mc-sep   { color: var(--border2); margin: 0 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo"><span>VA Dems</span></div>
    <h1>Virginia <span>April 21, 2026</span> — Proposed Constitutional Amendment</h1>
    <div class="meta" id="meta-bar">
      <span><span class="refresh-dot"></span><span id="last-updated">Loading…</span></span>
      <span id="refresh-cd"></span>
    </div>
  </div>

  <!-- STATEWIDE BANNER -->
  <div id="banner">
    <div class="banner-row">
      <div class="vote-block yes">
        <span class="label">Yes</span>
        <span class="count" id="sw-yes">—</span>
        <span class="pct" id="sw-yes-pct"></span>
      </div>

      <div class="vote-bar-wrap">
        <div class="vote-bar">
          <div class="bar-yes" id="bar-yes" style="width:0%"></div>
          <div class="bar-no"  id="bar-no"  style="width:0%"></div>
        </div>
        <div class="reporting-bar-wrap">
          <div class="reporting-bar">
            <div class="bar-fill" id="bar-reporting" style="width:0%"></div>
          </div>
          <div class="reporting-label" id="reporting-label">Loading…</div>
        </div>
      </div>

      <div class="vote-block no">
        <span class="pct" id="sw-no-pct"></span>
        <span class="count" id="sw-no">—</span>
        <span class="label">No</span>
      </div>

      <div class="banner-stats">
        <div class="stat-cell">
          <span class="s-label">Registered</span>
          <span class="s-val" id="sw-reg">—</span>
        </div>
        <div class="stat-cell">
          <span class="s-label">Turnout</span>
          <span class="s-val highlight" id="sw-turnout">—</span>
        </div>
        <div class="stat-cell">
          <span class="s-label">Abs. Returned</span>
          <span class="s-val" id="sw-ab">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sb-head">
        <button id="btn-statewide" class="active" onclick="selectLocality(null)">🗺 Statewide</button>
        <input type="text" id="loc-search" placeholder="Search locality…" oninput="filterSidebar(this.value)">
      </div>
      <ul id="locality-list"></ul>
    </div>

    <!-- MAIN -->
    <div id="main">
      <button id="back-btn" onclick="selectLocality(null)">← Back to Statewide</button>
      <div id="loc-header"></div>
      <div id="main-content">
        <div class="state-msg"><h3>Loading data…</h3></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
const DATA = { summary: null, localities: [], precincts: [], meta: null };
let selectedFips = null;
let locSortCol   = 'name';
let locSortDir   = 1;  // alpha ascending pre-election; user can click % Reporting
let preSortCol   = 'precinct_name';
let preSortDir   = 1;
let locFilter    = '';
let refreshSecs  = 120;
let cdInterval   = null;

// ── FETCH ──────────────────────────────────────────────────────────────────
const BASE = 'data/';

async function loadData() {
  const t = Date.now();  // cache-buster
  try {
    const [summary, localities, precincts, meta] = await Promise.all([
      fetch(`${BASE}summary.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}localities.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}precincts.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}metadata.json?t=${t}`).then(r => r.json()),
    ]);
    DATA.summary    = summary;
    DATA.localities = localities;
    DATA.precincts  = precincts;
    DATA.meta       = meta;
    render();
    startCountdown();
  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="state-msg"><h3>⚠ Failed to load data</h3><p>${err.message}</p></div>`;
  }
}

function startCountdown() {
  clearInterval(cdInterval);
  refreshSecs = 120;
  cdInterval = setInterval(() => {
    refreshSecs--;
    document.getElementById('refresh-cd').textContent = `Refresh in ${refreshSecs}s`;
    if (refreshSecs <= 0) {
      clearInterval(cdInterval);
      document.getElementById('refresh-cd').textContent = 'Refreshing…';
      loadData();
    }
  }, 1000);
}

// ── FORMATTING ─────────────────────────────────────────────────────────────
const fmt  = n => n == null ? '—' : Number(n).toLocaleString();
const fmtP = n => n == null ? '—' : n.toFixed(1) + '%';
const fmtK = n => {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
  return String(n);
};

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  renderBanner();
  renderSidebar();
  renderMain();
  document.getElementById('last-updated').textContent =
    DATA.meta ? `Updated: ${DATA.meta.last_updated}` : '';
}

function renderBanner() {
  const s = DATA.summary;
  if (!s) return;

  document.getElementById('sw-yes').textContent = fmt(s.yes);
  document.getElementById('sw-no').textContent  = fmt(s.no);
  document.getElementById('sw-yes-pct').textContent = s.yes_pct != null ? fmtP(s.yes_pct) : '';
  document.getElementById('sw-no-pct').textContent  = s.no_pct  != null ? fmtP(s.no_pct)  : '';

  const total = (s.yes || 0) + (s.no || 0);
  const yesPct = total > 0 ? s.yes / total * 100 : 0;
  const noPct  = total > 0 ? s.no  / total * 100 : 0;
  document.getElementById('bar-yes').style.width = yesPct + '%';
  document.getElementById('bar-no').style.width  = noPct  + '%';

  const pctRep = s.pct_reporting || 0;
  document.getElementById('bar-reporting').style.width = pctRep + '%';
  document.getElementById('reporting-label').textContent =
    `${fmt(s.precincts_rep)} of ${fmt(s.precincts_part)} precincts reporting (${fmtP(pctRep)})`;

  document.getElementById('sw-reg').textContent     = fmtK(s.reg_active);
  document.getElementById('sw-turnout').textContent = s.turnout_pct != null ? fmtP(s.turnout_pct) : (total > 0 ? '—' : 'Polls not yet reporting');
  document.getElementById('sw-ab').textContent      = fmtK(s.ab_voted);
}

function renderSidebar() {
  const btn = document.getElementById('btn-statewide');
  btn.className = selectedFips === null ? 'active' : '';

  const q = locFilter.toLowerCase();
  const filtered = DATA.localities
    .filter(l => !q || l.name.toLowerCase().includes(q))
    .sort((a, b) => a.name.localeCompare(b.name));

  const ul = document.getElementById('locality-list');
  ul.innerHTML = filtered.map(loc => {
    const pct = loc.pct_reporting || 0;
    const active = loc.fips === selectedFips;
    return `<li onclick="selectLocality('${loc.fips}')" class="${active ? 'active' : ''}">
      <div class="loc-name ${active ? 'active-name' : ''}">${titleCase(loc.name)}</div>
      <div class="loc-mini">
        <div class="loc-bar"><div class="lb-fill" style="width:${pct}%"></div></div>
        <span class="loc-pct">${pct > 0 ? Math.round(pct) + '%' : ''}</span>
      </div>
    </li>`;
  }).join('');
}

function filterSidebar(val) {
  locFilter = val;
  renderSidebar();
}

function renderMain() {
  if (selectedFips === null) {
    document.getElementById('back-btn').style.display   = 'none';
    document.getElementById('loc-header').style.display = 'none';
    renderLocalityTable();
  } else {
    document.getElementById('back-btn').style.display   = 'inline-block';
    renderLocHeader();
    renderPrecinctTable(selectedFips);
  }
}

// ── LOCALITY TABLE ─────────────────────────────────────────────────────────
function renderLocalityTable() {
  const s = DATA.summary || {};
  const isReporting = (s.precincts_rep || 0) > 0;

  // Stat cards row
  const cards = `
    <div class="loc-stat-row" style="margin-bottom:14px">
      <div class="loc-stat">
        <div class="ls-label">Precincts Reporting</div>
        <div class="ls-val">${fmt(s.precincts_rep)}/${fmt(s.precincts_part)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes Votes</div>
        <div class="ls-val yes-color">${isReporting ? fmt(s.yes) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes %</div>
        <div class="ls-val yes-color">${isReporting && s.yes_pct != null ? fmtP(s.yes_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No Votes</div>
        <div class="ls-val no-color">${isReporting ? fmt(s.no) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No %</div>
        <div class="ls-val no-color">${isReporting && s.no_pct != null ? fmtP(s.no_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Registered</div>
        <div class="ls-val">${fmtK(s.reg_active)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Turnout</div>
        <div class="ls-val">${isReporting && s.turnout_pct != null ? fmtP(s.turnout_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Returned</div>
        <div class="ls-val">${fmtK(s.ab_voted)}</div>
      </div>
    </div>`;
  const locs = [...DATA.localities].sort((a, b) => {
    const av = sortVal(a, locSortCol), bv = sortVal(b, locSortCol);
    return locSortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  const noResults = DATA.summary && DATA.summary.yes === 0 && DATA.summary.no === 0;

  const headers = [
    { key: 'name',          label: 'Locality',          cls: '' },
    { key: 'pct_reporting', label: '% Reporting',       cls: 'right' },
    { key: 'yes',           label: 'Yes',                cls: 'right' },
    { key: 'yes_pct',       label: 'Yes %',              cls: 'right' },
    { key: 'no',            label: 'No',                 cls: 'right' },
    { key: 'no_pct',        label: 'No %',               cls: 'right' },
    { key: 'total',         label: 'Total Votes',        cls: 'right' },
    { key: 'turnout_pct',   label: 'Turnout',            cls: 'right' },
    { key: 'ab_voted',      label: 'Abs. Returned',      cls: 'right' },
  ];

  const thead = headers.map(h =>
    `<th class="${h.cls}${locSortCol === h.key ? ' sorted' : ''}"
        onclick="sortLoc('${h.key}')">${h.label}${sortArrow(h.key, locSortCol, locSortDir)}</th>`
  ).join('');

  const tbody = locs.map(loc => {
    const isReporting = loc.precincts_rep > 0;
    const yesBar = loc.yes_pct != null ? `<span class="pct-bar yes" style="width:${Math.min(loc.yes_pct,100)*0.5}px"></span>` : '';
    const noBar  = loc.no_pct  != null ? `<span class="pct-bar no"  style="width:${Math.min(loc.no_pct,100)*0.5}px"></span>` : '';
    return `<tr class="${!isReporting && !noResults ? 'dim' : ''}">
      <td class="name-cell" onclick="selectLocality('${loc.fips}')">${titleCase(loc.name)}</td>
      <td class="right">${reportingBadge(loc.precincts_rep, loc.precincts_part)}</td>
      <td class="right">${isReporting ? `<span class="yes-val">${fmt(loc.yes)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${yesBar}${isReporting && loc.yes_pct != null ? `<span class="yes-val">${fmtP(loc.yes_pct)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${isReporting ? `<span class="no-val">${fmt(loc.no)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${noBar}${isReporting && loc.no_pct != null ? `<span class="no-val">${fmtP(loc.no_pct)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right muted">${isReporting ? fmt(loc.total) : '—'}</td>
      <td class="right muted">${isReporting && loc.turnout_pct != null ? fmtP(loc.turnout_pct) : '—'}</td>
      <td class="right"><span class="ab-note"><strong>${fmtK(loc.ab_voted)}</strong></span></td>
    </tr>`;
  }).join('');

  const note = noResults
    ? `<div style="padding:10px 16px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border)">
         Polls close at 7:00 PM ET. Absentee column shows early/mail ballots accepted as of this morning.
       </div>` : '';

  document.getElementById('main-content').innerHTML = cards + `
    <div class="tbl-wrap">
      <div class="tbl-title">
        <span>All Localities</span>
        <span class="tbl-count">${locs.length} localities</span>
      </div>
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
      ${note}
    </div>`;
}

// ── LOCALITY HEADER (drill-down) ───────────────────────────────────────────
function renderLocHeader() {
  const loc = DATA.localities.find(l => l.fips === selectedFips);
  if (!loc) { document.getElementById('loc-header').style.display = 'none'; return; }

  const isReporting = loc.precincts_rep > 0;
  document.getElementById('loc-header').style.display = 'block';
  document.getElementById('loc-header').innerHTML = `
    <h2>${titleCase(loc.name)}</h2>
    <div class="loc-stat-row">
      <div class="loc-stat">
        <div class="ls-label">Precincts</div>
        <div class="ls-val">${loc.precincts_rep}/${loc.precincts_part}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes</div>
        <div class="ls-val yes-color">${isReporting ? fmt(loc.yes) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No</div>
        <div class="ls-val no-color">${isReporting ? fmt(loc.no) : '—'}</div>
      </div>
      ${isReporting ? `<div class="loc-stat">
        <div class="ls-label">Yes %</div>
        <div class="ls-val yes-color">${fmtP(loc.yes_pct)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Turnout</div>
        <div class="ls-val">${fmtP(loc.turnout_pct)}</div>
      </div>` : ''}
      <div class="loc-stat">
        <div class="ls-label">Reg. Voters</div>
        <div class="ls-val">${fmt(loc.reg_active)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Returned</div>
        <div class="ls-val">${fmt(loc.ab_voted)}</div>
      </div>
    </div>`;
}

// ── PRECINCT TABLE ─────────────────────────────────────────────────────────
function renderPrecinctTable(fips) {
  const precs = DATA.precincts.filter(p => p.fips === fips);
  if (!precs.length) {
    document.getElementById('main-content').innerHTML =
      `<div class="state-msg"><h3>No precinct data for this locality.</h3></div>`;
    return;
  }

  const sorted = [...precs].sort((a, b) => {
    const av = sortVal(a, preSortCol), bv = sortVal(b, preSortCol);
    return preSortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  const headers = [
    { key: 'precinct_name',   label: 'Precinct',       cls: '' },
    { key: 'reporting_status',label: 'Status',          cls: '' },
    { key: 'yes',             label: 'Yes',             cls: 'right' },
    { key: 'yes_pct',         label: 'Yes %',           cls: 'right' },
    { key: 'no',              label: 'No',              cls: 'right' },
    { key: 'no_pct',          label: 'No %',            cls: 'right' },
    { key: 'total',           label: 'Total',           cls: 'right' },
    { key: 'reg_active',      label: 'Reg.',            cls: 'right' },
    { key: 'turnout_pct',     label: 'Turnout',         cls: 'right' },
  ];

  const thead = headers.map(h =>
    `<th class="${h.cls}${preSortCol === h.key ? ' sorted' : ''}"
        onclick="sortPre('${h.key}')">${h.label}${sortArrow(h.key, preSortCol, preSortDir)}</th>`
  ).join('');

  const tbody = sorted.map(p => {
    const rep = p.reporting_status === 'Reported';
    const yesBar = p.yes_pct != null && rep ? `<span class="pct-bar yes" style="width:${Math.min(p.yes_pct,100)*0.4}px"></span>` : '';
    const noBar  = p.no_pct  != null && rep ? `<span class="pct-bar no"  style="width:${Math.min(p.no_pct, 100)*0.4}px"></span>` : '';
    return `<tr class="${!rep ? 'dim' : ''}">
      <td style="font-weight:500">${p.display_name || p.precinct_name || p.precinct_id}</td>
      <td>${statusBadge(p.reporting_status)}</td>
      <td class="right"><span class="yes-val">${rep ? fmt(p.yes) : '—'}</span></td>
      <td class="right">${yesBar}<span class="yes-val">${rep && p.yes_pct != null ? fmtP(p.yes_pct) : '—'}</span></td>
      <td class="right"><span class="no-val">${rep ? fmt(p.no) : '—'}</span></td>
      <td class="right">${noBar}<span class="no-val">${rep && p.no_pct != null ? fmtP(p.no_pct) : '—'}</span></td>
      <td class="right muted">${rep ? fmt(p.total) : '—'}</td>
      <td class="right muted">${fmt(p.reg_active)}</td>
      <td class="right muted">${rep && p.turnout_pct != null ? fmtP(p.turnout_pct) : '—'}</td>
    </tr>`;
  }).join('');

  const repCount = sorted.filter(p => p.reporting_status === 'Reported').length;

  document.getElementById('main-content').innerHTML = `
    <div class="tbl-wrap">
      <div class="tbl-title">
        <span>Precincts</span>
        <span class="tbl-count">${repCount}/${sorted.length} reported</span>
      </div>
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

// ── INTERACTION ─────────────────────────────────────────────────────────────
function selectLocality(fips) {
  selectedFips = fips;
  renderSidebar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
}

function sortLoc(col) {
  if (locSortCol === col) locSortDir *= -1;
  else { locSortCol = col; locSortDir = -1; }
  renderLocalityTable();
}

function sortPre(col) {
  if (preSortCol === col) preSortDir *= -1;
  else { preSortCol = col; preSortDir = -1; }
  renderPrecinctTable(selectedFips);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function sortVal(obj, col) {
  const v = obj[col];
  if (v == null) return col === 'name' || col === 'precinct_name' || col === 'reporting_status' ? '' : -Infinity;
  return v;
}

function sortArrow(col, activeCol, dir) {
  if (col !== activeCol) return '';
  return dir > 0 ? ' ▲' : ' ▼';
}

function reportingBadge(rep, part) {
  if (!part) return '<span class="badge not-rep">—</span>';
  const pct = Math.round(rep / part * 100);
  if (rep === 0)    return `<span class="badge not-rep">0/${part}</span>`;
  if (rep === part) return `<span class="badge reported">${rep}/${part} ✓</span>`;
  return `<span class="badge partial">${rep}/${part} (${pct}%)</span>`;
}

function statusBadge(status) {
  if (!status || status === 'Not Reported')
    return '<span class="badge not-rep">Not Reported</span>';
  if (status === 'Reported')
    return '<span class="badge reported">Reported</span>';
  return `<span class="badge partial">${status}</span>`;
}

function titleCase(s) {
  if (!s) return '';
  return s.replace(/\w\S*/g, w =>
    w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
  );
}

// ── BOOT ───────────────────────────────────────────────────────────────────
loadData();
</script>
