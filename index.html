<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia April 21, 2026 — Referendum Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0f1117;
  --surface:     #1a1d27;
  --surface2:    #20243a;
  --border:      #2a2d3a;
  --border2:     #353a50;
  --text:        #e8eaf0;
  --text-muted:  #8890a8;
  --accent:      #3a8fd4;
  --yes:         #2166ac;
  --yes-lt:      #74add1;
  --yes-bg:      rgba(33,102,172,.12);
  --no:          #c0392b;
  --no-lt:       #e57368;
  --no-bg:       rgba(192,57,43,.12);
  --green:       #27ae60;
  --amber:       #f0a500;
  --radius:      6px;
  --font:        'DM Sans', system-ui, sans-serif;
  --mono:        'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 44px;
  flex-shrink: 0;
}

#header .logo {
  height: 28px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

#header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
#header h1 span { color: var(--accent); }

#header .meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--mono);
  flex-shrink: 0;
}
#header .meta .refresh-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-right: 4px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .3; }
}

/* ── STATEWIDE BANNER ──────────────────────────────────── */
#banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  flex-shrink: 0;
}

/* banner CSS removed - now inline */

/* ── LAYOUT ─────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#body {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar .sb-head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar .sb-head button {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 10px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  margin-bottom: 8px;
  transition: background .15s, border-color .15s;
}
#sidebar .sb-head button:hover,
#sidebar .sb-head button.active {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--accent);
}
#sidebar input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  padding: 6px 10px;
  font-family: var(--font);
  font-size: 12px;
  outline: none;
}
#sidebar input:focus { border-color: var(--accent); }
#sidebar input::placeholder { color: var(--text-muted); }

#locality-list {
  flex: 1;
  overflow-y: auto;
  list-style: none;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
#locality-list li {
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 0;
  transition: background .1s;
}
#locality-list li:hover    { background: var(--surface2); }
#locality-list li.active   { background: rgba(58,143,212,.12); }
#locality-list li .loc-name {
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#locality-list li .loc-name.active-name { color: var(--accent); }
#locality-list li .loc-mini {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
#locality-list li .loc-bar {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
#locality-list li .loc-bar .lb-fill {
  height: 100%;
  background: var(--accent);
}
#locality-list li .loc-pct {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* ── MAIN PANEL ─────────────────────────────────────────── */
#main {
  /* sizing now inline */
}

/* Back button */
#back-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-muted);
  padding: 5px 12px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: border-color .15s, color .15s;
}
#back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Locality header in drill-down */
#loc-header {
  display: none;
  margin-bottom: 14px;
}
#loc-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.loc-stat-row {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  margin-bottom: 10px;
  overflow-x: auto;
}
.loc-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 8px;
  min-width: 0;
  flex-shrink: 0;
}
.loc-stat .ls-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  white-space: nowrap;
}
.loc-stat .ls-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}
.loc-stat .ls-val.yes-color { color: var(--yes-lt); }
.loc-stat .ls-val.no-color  { color: var(--no-lt); }

/* Table */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.tbl-scroll {
  /* overflow handled by #main */
}
.tbl-title {
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tbl-title .tbl-count {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 11px;
}

table {
  width: 100%;
  min-width: 900px;
  border-collapse: collapse;
  font-size: 12.5px;
}
thead th {
  padding: 5px 8px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  text-align: left;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 0 var(--border);
}
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
thead th.right { text-align: right; }

tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.03); }
tbody tr.dim { opacity: .45; }

td {
  padding: 5px 8px;
  white-space: nowrap;
}
td.name-cell {
  font-weight: 500;
  cursor: pointer;
  color: var(--accent);
}
td.name-cell:hover { text-decoration: underline; }
td.right { text-align: right; font-family: var(--mono); }

td .yes-val { color: var(--yes-lt); font-family: var(--mono); }
td .no-val  { color: var(--no-lt);  font-family: var(--mono); }
td .muted   { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }

.pct-bar {
  display: inline-block;
  height: 10px;
  border-radius: 3px;
  vertical-align: middle;
  margin-right: 5px;
}
.pct-bar.yes { background: var(--yes); }
.pct-bar.no  { background: var(--no); }

/* Sticky first data column */
td.name-cell {
  position: sticky;
  left: 24px;
  background: var(--surface);
  z-index: 5;
}
tr:hover td.name-cell { background: rgba(255,255,255,.03); }
tr.dim td.name-cell   { background: var(--surface); }
thead th:nth-child(1) {
  position: sticky;
  left: 0;
  z-index: 15;
  background: var(--surface2);
  width: 24px;
}
thead th:nth-child(2) {
  position: sticky;
  left: 24px;
  z-index: 15;
  background: var(--surface2);
}

/* Status badge */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.badge.reported  { background: rgba(39,174,96,.18);  color: #5dba7f; }
.badge.not-rep   { background: var(--border2); color: var(--text-muted); }
.badge.partial   { background: rgba(240,165,0,.15);  color: #f0c050; }

/* Empty / loading states */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.state-msg h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.state-msg p  { font-size: 13px; }

/* Absentee context strip */
.ab-note {
  font-size: 11px;
  color: var(--text-muted);
}
.ab-note strong { color: var(--text); }

/* Tracked flag */
/* Flag cell sticky */
td:first-child {
  position: sticky;
  left: 0;
  background: var(--surface);
  z-index: 4;
  width: 24px;
}
tr:hover td:first-child { background: rgba(255,255,255,.03); }

.flag-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 11px;
  padding: 0 2px;
  opacity: 0;
  transition: opacity .15s;
  line-height: 1;
  filter: grayscale(1);
}
tr:hover .flag-btn,
li:hover .flag-btn { opacity: .4; filter: grayscale(1); }
.flag-btn:hover  { opacity: .7 !important; filter: grayscale(0) !important; }
.flag-btn.flagged { opacity: .8; filter: grayscale(0); }

#flag-filter-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-muted);
  padding: 5px 10px;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  margin-top: 6px;
  transition: border-color .15s, color .15s, background .15s;
  text-align: left;
}
#flag-filter-btn.active {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(240,165,0,.08);
}

.method-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.method-chip {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
}
.method-chip .mc-label { color: var(--text-muted); }
.method-chip .mc-yes   { color: var(--yes-lt); font-family: var(--mono); }
.method-chip .mc-no    { color: var(--no-lt);  font-family: var(--mono); }
.method-chip .mc-sep   { color: var(--border2); margin: 0 3px; }

/* Absentee reporting-state chips (pending / reported / canvassed) */
.ab-chip {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  font-family: var(--font);
  line-height: 1.5;
  vertical-align: middle;
}
.ab-chip.pending   { background: rgba(136,144,168,0.12); color: var(--text-muted); border: 1px solid rgba(136,144,168,0.35); }
.ab-chip.reported  { background: rgba(58,143,212,0.15);  color: var(--accent);     border: 1px solid rgba(58,143,212,0.45); }
.ab-chip.canvassed { background: rgba(39,174,96,0.15);   color: var(--green);      border: 1px solid rgba(39,174,96,0.45); }
.ab-chip.inline    { margin-left: 6px; }
</style>
</head>

    <div id="called-banner" style="display:none;margin-top:10px;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 14px;font-size:13px;color:var(--text);font-family:var(--mono);"></div>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sb-head">
        <button id="btn-statewide" class="active" onclick="selectLocality(null)">🗺 Statewide</button>
        <button id="flag-filter-btn" onclick="toggleTrackedFilter()">⭐ Show Tracked</button>
        <input type="text" id="loc-search" placeholder="Search locality…" oninput="filterSidebar(this.value)">
      </div>
      <ul id="locality-list"></ul>
    </div>

    <!-- MAIN -->
    <div id="main-outer" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
      <div id="stat-cards-bar" style="flex-shrink:0;background:#0f1117;padding:8px 16px 6px;border-bottom:1px solid var(--border2);"></div>
      <div id="main" style="flex:1;overflow-y:auto;overflow-x:auto;padding:0 16px 10px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;">
        <button id="back-btn" onclick="selectLocality(null)">← Back to Statewide</button>
        <div id="loc-header"></div>
        <div id="main-content">
          <div class="state-msg"><h3>Loading data…</h3></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
const DATA = { summary: null, localities: [], precincts: [], meta: null };
let selectedFips = null;
let locSortCol   = 'name';
let locSortDir   = 1;  // alpha ascending pre-election; user can click % Reporting
let preSortCol   = 'precinct_name';
let preSortDir   = 1;
let locFilter    = '';
let refreshSecs  = 120;
let cdInterval   = null;
let flaggedFips  = new Set(JSON.parse(localStorage.getItem('enr_tracked') || '[]'));
let showOnlyTracked = false;

function saveFlagged() {
  localStorage.setItem('enr_tracked', JSON.stringify([...flaggedFips]));
}

function toggleFlag(fips, e) {
  e.stopPropagation();
  if (flaggedFips.has(fips)) flaggedFips.delete(fips);
  else flaggedFips.add(fips);
  saveFlagged();
  renderSidebar();
  if (selectedFips === null) renderLocalityTable();
}

function toggleTrackedFilter() {
  showOnlyTracked = !showOnlyTracked;
  const btn = document.getElementById('flag-filter-btn');
  btn.classList.toggle('active', showOnlyTracked);
  btn.textContent = showOnlyTracked ? '⭐ All Localities' : '⭐ Show Tracked';
  renderSidebar();
  if (selectedFips === null) renderLocalityTable();
}

// ── FETCH ──────────────────────────────────────────────────────────────────
const BASE = 'data/';

async function loadData() {
  const t = Date.now();  // cache-buster
  try {
    const [summary, localities, precincts, meta] = await Promise.all([
      fetch(`${BASE}summary.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}localities.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}precincts.json?t=${t}`).then(r => r.json()),
      fetch(`${BASE}metadata.json?t=${t}`).then(r => r.json()),
    ]);
    DATA.summary    = summary;
    DATA.localities = localities;
    DATA.precincts  = precincts;
    DATA.meta       = meta;
    render();
    startCountdown();
  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="state-msg"><h3>⚠ Failed to load data</h3><p>${err.message}</p></div>`;
  }
}

function startCountdown() {
  clearInterval(cdInterval);
  refreshSecs = 60;
  cdInterval = setInterval(() => {
    refreshSecs--;
    document.getElementById('refresh-cd').textContent = `Refresh in ${refreshSecs}s`;
    if (refreshSecs <= 0) {
      clearInterval(cdInterval);
      document.getElementById('refresh-cd').textContent = 'Refreshing…';
      loadData();
    }
  }, 1000);
}

// ── FORMATTING ─────────────────────────────────────────────────────────────
const fmt  = n => n == null ? '—' : Number(n).toLocaleString();
const fmtP = n => n == null ? '—' : n.toFixed(1) + '%';
const fmtK = n => {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
  return String(n);
};

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  // Auto-flip sort to % reporting desc once precincts start reporting
  const rep = DATA.summary ? (DATA.summary.precincts_rep || 0) : 0;
  if (rep > 0 && locSortCol === 'name') {
    locSortCol = 'pct_reporting';
    locSortDir = -1;
  }
  renderBanner();
  renderSidebar();
  renderMain();
  document.getElementById('last-updated').textContent =
    DATA.meta ? `Results: ${DATA.meta.last_updated}` : '';
  document.getElementById('ab-updated').textContent =
    DATA.meta && DATA.meta.ab_updated ? `Ab: ${DATA.meta.ab_updated}` : '';
}

function renderBanner() {
  const s = DATA.summary;
  if (!s) return;

  document.getElementById('sw-yes').textContent = fmt(s.yes);
  document.getElementById('sw-no').textContent  = fmt(s.no);
  document.getElementById('sw-yes-pct').textContent = s.yes_pct != null ? fmtP(s.yes_pct) : '';
  document.getElementById('sw-no-pct').textContent  = s.no_pct  != null ? fmtP(s.no_pct)  : '';

  const total = (s.yes || 0) + (s.no || 0);
  const yesPct = total > 0 ? s.yes / total * 100 : 0;
  const noPct  = total > 0 ? s.no  / total * 100 : 0;
  document.getElementById('bar-yes').style.width = yesPct + '%';
  document.getElementById('bar-no').style.width  = noPct  + '%';

  const pctRep = s.pct_reporting || 0;
  document.getElementById('bar-reporting').style.width = pctRep + '%';
  document.getElementById('reporting-label').textContent =
    `${fmt(s.precincts_rep)} of ${fmt(s.precincts_part)} precincts`;
  document.getElementById('reporting-pct').textContent = fmtP(pctRep);

  // Called indicator
  const calledEl = document.getElementById('called-banner');
  if (s.total > 0 && pctRep >= 50) {
    const margin = Math.abs((s.yes_pct || 0) - (s.no_pct || 0));
    const leader = (s.yes || 0) > (s.no || 0) ? 'YES' : 'NO';
    const leaderColor = leader === 'YES' ? 'var(--yes)' : 'var(--no)';
    if (margin >= 8 || pctRep >= 85) {
      calledEl.style.display = 'block';
      calledEl.style.borderColor = leaderColor;
      calledEl.innerHTML = `<span style="color:${leaderColor};font-weight:700;font-size:15px">
        ${leader} LEADING</span> &nbsp;·&nbsp; ${fmtP(leader === 'YES' ? s.yes_pct : s.no_pct)} with ${fmtP(pctRep)} reporting
        ${pctRep >= 85 ? ' &nbsp;<span style="background:'+leaderColor+';color:#fff;padding:1px 7px;border-radius:3px;font-size:11px">CALLED</span>' : ''}`;
    } else {
      calledEl.style.display = 'none';
    }
  } else {
    calledEl.style.display = 'none';
  }


}

function renderSidebar() {
  const btn = document.getElementById('btn-statewide');
  btn.className = selectedFips === null ? 'active' : '';

  const q = locFilter.toLowerCase();
  const filtered = DATA.localities
    .filter(l => {
      if (showOnlyTracked && !flaggedFips.has(l.fips)) return false;
      return !q || l.name.toLowerCase().includes(q);
    })
    .sort((a, b) => a.name.localeCompare(b.name));

  const ul = document.getElementById('locality-list');
  ul.innerHTML = filtered.map(loc => {
    const pct = loc.pct_reporting || 0;
    const active = loc.fips === selectedFips;
    const flagged = flaggedFips.has(loc.fips);
    return `<li onclick="selectLocality('${loc.fips}')" class="${active ? 'active' : ''}">
      <div style="display:flex;align-items:center;gap:4px">
        <button class="flag-btn ${flagged ? 'flagged' : ''}" onclick="toggleFlag('${loc.fips}', event)" title="${flagged ? 'Remove tracked' : 'Mark as tracked'}">⭐</button>
        <span class="loc-name ${active ? 'active-name' : ''}">${titleCase(loc.name)}</span>
      </div>
      <div class="loc-mini">
        <div class="loc-bar"><div class="lb-fill" style="width:${pct}%"></div></div>
        <span class="loc-pct">${pct > 0 ? Math.round(pct) + '%' : ''}</span>
      </div>
    </li>`;
  }).join('');
}

function filterSidebar(val) {
  locFilter = val;
  renderSidebar();
}

function renderMain() {
  if (selectedFips === null) {
    document.getElementById('back-btn').style.display   = 'none';
    document.getElementById('loc-header').style.display = 'none';
    renderLocalityTable();
  } else {
    document.getElementById('back-btn').style.display   = 'inline-block';
    renderLocHeader();
    renderPrecinctTable(selectedFips);
  }
}

// ── LOCALITY TABLE ─────────────────────────────────────────────────────────
function deltaCell(isReporting, yes_pct, demperf) {
  if (!isReporting || yes_pct == null || demperf == null) return '<span class="muted">—</span>';
  const d = (yes_pct - demperf).toFixed(1);
  const col = d >= 0 ? 'color:#5dba7f' : 'color:#e57368';
  const sign = d >= 0 ? '+' : '';
  return '<span style="' + col + ';font-family:var(--mono);font-weight:600">' + sign + d + '%</span>';
}

function renderLocalityTable() {
  const s = DATA.summary || {};
  const isReporting = (s.precincts_rep || 0) > 0;

  // Stat cards row
  const cards = `
    <div class="loc-stat-row" style="margin-bottom:0;position:sticky;top:0;z-index:20;background:#0f1117;padding:8px 0 10px 0;margin-top:-2px;">
      <div class="loc-stat">
        <div class="ls-label">Precincts Reporting</div>
        <div class="ls-val">${fmt(s.precincts_rep)}/${fmt(s.precincts_part)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes Votes</div>
        <div class="ls-val yes-color">${isReporting ? fmt(s.yes) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes %</div>
        <div class="ls-val yes-color">${isReporting && s.yes_pct != null ? fmtP(s.yes_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No Votes</div>
        <div class="ls-val no-color">${isReporting ? fmt(s.no) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No %</div>
        <div class="ls-val no-color">${isReporting && s.no_pct != null ? fmtP(s.no_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Registered</div>
        <div class="ls-val">${fmtK(s.reg_active)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Turnout</div>
        <div class="ls-val">${isReporting && s.turnout_pct != null ? fmtP(s.turnout_pct) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Returned</div>
        <div class="ls-val">${fmtK(s.ab_voted)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Outstanding</div>
        <div class="ls-val">${fmtK(s.ab_outstanding)} <span style="font-size:11px;color:var(--text-muted);font-weight:400">${(s.ab_voted && s.ab_outstanding != null) ? '(' + Math.round(s.ab_outstanding / s.ab_voted * 100) + '%)' : ''}</span></div>
        ${(s.ab_dem_outstanding != null || s.ab_rep_outstanding != null) ? `<div style="font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-top:2px;letter-spacing:0.3px">Est: <span style="color:var(--yes-lt)">D ${fmtK(s.ab_dem_outstanding)}</span> · <span style="color:var(--no-lt)">R ${fmtK(s.ab_rep_outstanding)}</span></div>` : ''}
      </div>
    </div>`;
  const locs = [...DATA.localities]
    .filter(l => !showOnlyTracked || flaggedFips.has(l.fips))
    .sort((a, b) => {
    const av = sortVal(a, locSortCol), bv = sortVal(b, locSortCol);
    return locSortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  const noResults = DATA.summary && DATA.summary.yes === 0 && DATA.summary.no === 0;

  const headers = [
    { key: 'flag',          label: '⭐',                cls: '' },
    { key: 'name',          label: 'Locality',          cls: '' },
    { key: 'pct_reporting', label: 'Reporting',          cls: 'right' },
    { key: 'absentee_state',label: 'Ab Status',          cls: '' },
    { key: 'yes',           label: 'Yes',                cls: 'right' },
    { key: 'yes_pct',       label: 'Yes %',              cls: 'right' },
    { key: 'no',            label: 'No',                 cls: 'right' },
    { key: 'no_pct',        label: 'No %',               cls: 'right' },
    { key: 'total',         label: 'Total Votes',        cls: 'right' },
    { key: 'turnout_pct',   label: 'Turnout',            cls: 'right' },
    { key: 'ab_dem_pct',    label: 'Ab D%',              cls: 'right' },
    { key: 'ab_dem_est',    label: 'Ab Dem Est',         cls: 'right' },
    { key: 'ab_rep_pct',    label: 'Ab R%',              cls: 'right' },
    { key: 'ab_rep_est',    label: 'Ab Rep Est',         cls: 'right' },
    { key: 'ncec_demperf',  label: 'DemPerf',            cls: 'right' },
    { key: 'delta',         label: 'Yes vs Base',         cls: 'right' },
    { key: 'ab_voted',      label: 'Abs. Returned',      cls: 'right' },
    { key: 'ab_outstanding',     label: 'Abs. Outstanding',   cls: 'right' },
    { key: 'ab_dem_outstanding', label: 'D Out Est',          cls: 'right' },
    { key: 'ab_rep_outstanding', label: 'R Out Est',          cls: 'right' },
  ];

  const thead = headers.map(h =>
    `<th class="${h.cls}${locSortCol === h.key ? ' sorted' : ''}"
        onclick="sortLoc('${h.key}')">${h.label}${sortArrow(h.key, locSortCol, locSortDir)}</th>`
  ).join('');

  const tbody = locs.map(loc => {
    const isReporting = loc.precincts_rep > 0;
    const flagged = flaggedFips.has(loc.fips);
    const noBar  = loc.no_pct  != null ? `<span class="pct-bar no"  style="width:${Math.min(loc.no_pct,100)*0.5}px"></span>` : '';
    return `<tr class="${!isReporting && !noResults ? 'dim' : ''}">
      <td><button class="flag-btn ${flagged ? 'flagged' : ''}" onclick="toggleFlag('${loc.fips}', event)">⭐</button></td>
      <td class="name-cell" onclick="selectLocality('${loc.fips}')">${titleCase(loc.name)}</td>
      <td class="right">${reportingBadge(loc.precincts_rep, loc.precincts_part)}</td>
      <td>${abChip(loc.absentee_state)}</td>
      <td class="right">${isReporting ? `<span class="yes-val">${fmt(loc.yes)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${isReporting && loc.yes_pct != null ? `<span class="yes-val">${fmtP(loc.yes_pct)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${isReporting ? `<span class="no-val">${fmt(loc.no)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right">${isReporting && loc.no_pct != null ? `<span class="no-val">${fmtP(loc.no_pct)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="right muted">${isReporting ? fmt(loc.total) : '—'}</td>
      <td class="right muted">${isReporting && loc.turnout_pct != null ? fmtP(loc.turnout_pct) : '—'}</td>
      <td class="right"><span style="color:var(--yes-lt);font-family:var(--mono)">${loc.ab_dem_pct != null ? fmtP(loc.ab_dem_pct) : '—'}</span></td>
      <td class="right"><span style="color:var(--yes-lt);font-family:var(--mono)">${(loc.ab_dem_pct != null && loc.ab_voted != null) ? fmt(Math.round(loc.ab_voted * loc.ab_dem_pct / 100)) : '—'}</span></td>
      <td class="right"><span style="color:var(--no-lt);font-family:var(--mono)">${loc.ab_rep_pct != null ? fmtP(loc.ab_rep_pct) : '—'}</span></td>
      <td class="right"><span style="color:var(--no-lt);font-family:var(--mono)">${(loc.ab_rep_pct != null && loc.ab_voted != null) ? fmt(Math.round(loc.ab_voted * loc.ab_rep_pct / 100)) : '—'}</span></td>
      <td class="right muted">${loc.ncec_demperf != null ? fmtP(loc.ncec_demperf) : '—'}</td>
      <td class="right">${deltaCell(isReporting, loc.yes_pct, loc.ncec_demperf)}</td>
      <td class="right muted">${fmt(loc.ab_voted)}</td>
      <td class="right">${fmt(loc.ab_outstanding)}</td>
      <td class="right"><span style="color:var(--yes-lt);font-family:var(--mono)">${fmt(loc.ab_dem_outstanding)}</span></td>
      <td class="right"><span style="color:var(--no-lt);font-family:var(--mono)">${fmt(loc.ab_rep_outstanding)}</span></td>
    </tr>`;
  }).join('');

  const note = noResults
    ? `<div style="padding:10px 16px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border)">
         Polls close at 7:00 PM ET. Absentee column shows early/mail ballots accepted as of this morning.
       </div>` : '';

  document.getElementById('stat-cards-bar').innerHTML = cards.replace('style="margin-bottom:0;position:sticky;top:0;z-index:20;background:#0f1117;padding:8px 0 10px 0;margin-top:-2px;"', 'style="display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;"');
  document.getElementById('main-content').innerHTML = `
    <div class="tbl-wrap">
      <div class="tbl-title">
        ${showOnlyTracked ? "<span>Tracked Localities</span>" : "<span>All Localities</span>"}
        <span class="tbl-count">${locs.length}${showOnlyTracked ? " tracked" : " localities"}</span>
      </div>
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
      ${note}
    </div>`;
}

// ── LOCALITY HEADER (drill-down) ───────────────────────────────────────────
function renderLocHeader() {
  const loc = DATA.localities.find(l => l.fips === selectedFips);
  if (!loc) { document.getElementById('loc-header').style.display = 'none'; return; }

  const isReporting = loc.precincts_rep > 0;
  document.getElementById('loc-header').style.display = 'block';
  document.getElementById('loc-header').innerHTML = `
    <h2>${titleCase(loc.name)}${abChip(loc.absentee_state, 'inline')}</h2>
    <div class="loc-stat-row">
      <div class="loc-stat">
        <div class="ls-label">Precincts</div>
        <div class="ls-val">${loc.precincts_rep}/${loc.precincts_part}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Yes</div>
        <div class="ls-val yes-color">${isReporting ? fmt(loc.yes) : '—'}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">No</div>
        <div class="ls-val no-color">${isReporting ? fmt(loc.no) : '—'}</div>
      </div>
      ${isReporting ? `<div class="loc-stat">
        <div class="ls-label">Yes %</div>
        <div class="ls-val yes-color">${fmtP(loc.yes_pct)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Turnout</div>
        <div class="ls-val">${fmtP(loc.turnout_pct)}</div>
      </div>` : ''}
      <div class="loc-stat">
        <div class="ls-label">Reg. Voters</div>
        <div class="ls-val">${fmt(loc.reg_active)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Returned</div>
        <div class="ls-val">${fmt(loc.ab_voted)}</div>
      </div>
      <div class="loc-stat">
        <div class="ls-label">Abs. Outstanding</div>
        <div class="ls-val">${fmt(loc.ab_outstanding)} <span style="font-size:11px;color:var(--text-muted);font-weight:400">${(loc.ab_voted && loc.ab_outstanding != null) ? '(' + Math.round(loc.ab_outstanding / loc.ab_voted * 100) + '%)' : ''}</span></div>
        ${(loc.ab_dem_outstanding != null || loc.ab_rep_outstanding != null) ? `<div style="font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-top:2px;letter-spacing:0.3px">Est: <span style="color:var(--yes-lt)">D ${fmt(loc.ab_dem_outstanding)}</span> · <span style="color:var(--no-lt)">R ${fmt(loc.ab_rep_outstanding)}</span></div>` : ''}
      </div>
    </div>`;
}

// ── PRECINCT TABLE ─────────────────────────────────────────────────────────
function renderPrecinctTable(fips) {
  const precs = DATA.precincts.filter(p => p.fips === fips);
  if (!precs.length) {
    document.getElementById('main-content').innerHTML =
      `<div class="state-msg"><h3>No precinct data for this locality.</h3></div>`;
    return;
  }

  const sorted = [...precs].sort((a, b) => {
    const av = sortVal(a, preSortCol), bv = sortVal(b, preSortCol);
    return preSortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  const headers = [
    { key: 'precinct_name',   label: 'Precinct',       cls: '' },
    { key: 'reporting_status',label: 'Status',          cls: '' },
    { key: 'yes',             label: 'Yes',             cls: 'right' },
    { key: 'yes_pct',         label: 'Yes %',           cls: 'right' },
    { key: 'no',              label: 'No',              cls: 'right' },
    { key: 'no_pct',          label: 'No %',            cls: 'right' },
    { key: 'total',           label: 'Total',           cls: 'right' },
    { key: 'reg_active',      label: 'Reg.',            cls: 'right' },
    { key: 'turnout_pct',     label: 'Turnout',         cls: 'right' },
  ];

  const thead = headers.map(h =>
    `<th class="${h.cls}${preSortCol === h.key ? ' sorted' : ''}"
        onclick="sortPre('${h.key}')">${h.label}${sortArrow(h.key, preSortCol, preSortDir)}</th>`
  ).join('');

  const tbody = sorted.map(p => {
    const rep = p.reporting_status === 'Reported';
    const noBar  = p.no_pct  != null && rep ? `<span class="pct-bar no"  style="width:${Math.min(p.no_pct, 100)*0.4}px"></span>` : '';
    return `<tr class="${!rep ? 'dim' : ''}">
      <td style="font-weight:500">${p.display_name || p.precinct_name || p.precinct_id}</td>
      <td>${statusBadge(p.reporting_status)}</td>
      <td class="right"><span class="yes-val">${rep ? fmt(p.yes) : '—'}</span></td>
      <td class="right"><span class="yes-val">${rep && p.yes_pct != null ? fmtP(p.yes_pct) : '—'}</span></td>
      <td class="right"><span class="no-val">${rep ? fmt(p.no) : '—'}</span></td>
      <td class="right"><span class="no-val">${rep && p.no_pct != null ? fmtP(p.no_pct) : '—'}</span></td>
      <td class="right muted">${rep ? fmt(p.total) : '—'}</td>
      <td class="right muted">${fmt(p.reg_active)}</td>
      <td class="right muted">${rep && p.turnout_pct != null ? fmtP(p.turnout_pct) : '—'}</td>
    </tr>`;
  }).join('');

  const repCount = sorted.filter(p => p.reporting_status === 'Reported').length;

  document.getElementById('main-content').innerHTML = `
    <div class="tbl-wrap">
      <div class="tbl-title">
        <span>Precincts</span>
        <span class="tbl-count">${repCount}/${sorted.length} reported</span>
      </div>
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

// ── INTERACTION ─────────────────────────────────────────────────────────────
function selectLocality(fips) {
  selectedFips = fips;
  renderSidebar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
}

function sortLoc(col) {
  if (locSortCol === col) locSortDir *= -1;
  else { locSortCol = col; locSortDir = -1; }
  renderLocalityTable();
}

function sortPre(col) {
  if (preSortCol === col) preSortDir *= -1;
  else { preSortCol = col; preSortDir = -1; }
  renderPrecinctTable(selectedFips);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function sortVal(obj, col) {
  if (col === 'ab_dem_est') {
    return (obj.ab_dem_pct != null && obj.ab_voted != null) ? Math.round(obj.ab_voted * obj.ab_dem_pct / 100) : -Infinity;
  }
  if (col === 'ab_rep_est') {
    return (obj.ab_rep_pct != null && obj.ab_voted != null) ? Math.round(obj.ab_voted * obj.ab_rep_pct / 100) : -Infinity;
  }
  if (col === 'absentee_state') {
    // Order: pending (0) → reported (1) → canvassed (2)
    const order = { pending: 0, reported: 1, canvassed: 2 };
    return order[obj.absentee_state] != null ? order[obj.absentee_state] : -1;
  }
  const v = obj[col];
  if (v == null) return col === 'name' || col === 'precinct_name' || col === 'reporting_status' ? '' : -Infinity;
  return v;
}

function sortArrow(col, activeCol, dir) {
  if (col !== activeCol) return '';
  return dir > 0 ? ' ▲' : ' ▼';
}

function reportingBadge(rep, part) {
  if (!part) return '<span class="badge not-rep">—</span>';
  const pct = Math.round(rep / part * 100);
  if (rep === 0)    return `<span class="badge not-rep">0/${part}</span>`;
  if (rep === part) return `<span class="badge reported">${rep}/${part} ✓</span>`;
  return `<span class="badge partial">${rep}/${part} (${pct}%)</span>`;
}

function statusBadge(status) {
  if (!status || status === 'Not Reported')
    return '<span class="badge not-rep">Not Reported</span>';
  if (status === 'Reported')
    return '<span class="badge reported">Reported</span>';
  return `<span class="badge partial">${status}</span>`;
}

function abChip(state, style) {
  // state: 'pending' | 'reported' | 'canvassed'
  // style: 'inline' or '' (inline adds left margin for use next to locality name)
  const s = state || 'pending';
  const label = s === 'canvassed' ? 'Canvassed' : (s === 'reported' ? 'Reported' : 'Pending');
  const extra = style === 'inline' ? ' inline' : '';
  return `<span class="ab-chip ${s}${extra}">${label}</span>`;
}

function titleCase(s) {
  if (!s) return '';
  return s.replace(/\w\S*/g, w =>
    w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
  );
}

// ── BOOT ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
